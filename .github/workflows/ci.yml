name: App CI

on:
  pull_request:
    paths:
      - "apps/**"
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - "eslint.config.mjs"
      - ".github/workflows/ci.yml"
  push:
    branches: ["main"]
    paths:
      - "apps/**"
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - "eslint.config.mjs"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  app-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint workspaces
        run: npm run lint

      - name: Build workspaces
        run: npm run build
