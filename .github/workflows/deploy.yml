name: Build And Publish Containers

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  API_IMAGE_NAME: devops-community-api
  WEB_IMAGE_NAME: devops-community-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      api_image: ${{ steps.images.outputs.api_image }}
      web_image: ${{ steps.images.outputs.web_image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Normalize image owner
        id: vars
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Define image tags
        id: images
        run: |
          owner="${{ steps.vars.outputs.owner }}"
          sha="${{ github.sha }}"
          echo "api_image=ghcr.io/${owner}/${API_IMAGE_NAME}:${sha}" >> "$GITHUB_OUTPUT"
          echo "api_latest=ghcr.io/${owner}/${API_IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"
          echo "web_image=ghcr.io/${owner}/${WEB_IMAGE_NAME}:${sha}" >> "$GITHUB_OUTPUT"
          echo "web_latest=ghcr.io/${owner}/${WEB_IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Build API image
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t "${{ steps.images.outputs.api_image }}" \
            -t "${{ steps.images.outputs.api_latest }}" \
            .

      - name: Build web image
        run: |
          docker build \
            -f apps/web/Dockerfile \
            -t "${{ steps.images.outputs.web_image }}" \
            -t "${{ steps.images.outputs.web_latest }}" \
            .

      - name: Push API image
        run: |
          docker push "${{ steps.images.outputs.api_image }}"
          docker push "${{ steps.images.outputs.api_latest }}"

      - name: Push web image
        run: |
          docker push "${{ steps.images.outputs.web_image }}"
          docker push "${{ steps.images.outputs.web_latest }}"

  deploy-to-kubernetes:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Validate deployment settings
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
          INGRESS_HOST: ${{ vars.INGRESS_HOST }}
        run: |
          test -n "$KUBE_CONFIG_DATA" || { echo "Missing secret: KUBE_CONFIG_DATA"; exit 1; }
          test -n "$PUBLIC_SITE_URL" || { echo "Missing variable: PUBLIC_SITE_URL"; exit 1; }
          test -n "$INGRESS_HOST" || { echo "Missing variable: INGRESS_HOST"; exit 1; }

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 --decode > "$HOME/.kube/config"

      - name: Render Kubernetes manifests
        run: |
          rm -rf /tmp/devops-community-k8s
          cp -R deploy/k8s /tmp/devops-community-k8s
          sed -i "s|ghcr.io/example/devops-community-api:latest|${{ needs.build-and-push.outputs.api_image }}|g" /tmp/devops-community-k8s/api-deployment.yaml
          sed -i "s|ghcr.io/example/devops-community-web:latest|${{ needs.build-and-push.outputs.web_image }}|g" /tmp/devops-community-k8s/web-deployment.yaml
          sed -i "s|__PUBLIC_SITE_URL__|${{ vars.PUBLIC_SITE_URL }}|g" /tmp/devops-community-k8s/configmap.yaml
          sed -i "s|__INGRESS_HOST__|${{ vars.INGRESS_HOST }}|g" /tmp/devops-community-k8s/ingress.yaml

      - name: Apply manifests
        run: kubectl apply -k /tmp/devops-community-k8s

      - name: Wait for rollouts
        run: |
          kubectl -n devops-community rollout status deployment/devops-community-api --timeout=180s
          kubectl -n devops-community rollout status deployment/devops-community-web --timeout=180s
