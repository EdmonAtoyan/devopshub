name: Build And Deploy Containers

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || 'edmond25' }}
  PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL || 'https://devopshub.one' }}
  INGRESS_HOST: ${{ vars.INGRESS_HOST || 'devopshub.one' }}
  TLS_SECRET_NAME: ${{ vars.TLS_SECRET_NAME || 'devopshub-one-tls' }}
  POSTGRES_DB: ${{ vars.POSTGRES_DB || 'devopshub' }}
  POSTGRES_USER: ${{ vars.POSTGRES_USER || 'devops' }}
  K8S_NAMESPACE: devopshub
  K8S_SECRET_NAME: community-secrets
  API_IMAGE_NAME: ${{ format('{0}/devopshub-api', vars.DOCKERHUB_USERNAME || 'edmond25') }}
  WEB_IMAGE_NAME: ${{ format('{0}/devopshub-web', vars.DOCKERHUB_USERNAME || 'edmond25') }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      api_image: ${{ steps.images.outputs.api_image }}
      web_image: ${{ steps.images.outputs.web_image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate registry settings
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          test -n "$DOCKERHUB_TOKEN" || { echo "Missing secret: DOCKERHUB_TOKEN"; exit 1; }

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Define image tags
        id: images
        run: |
          set -euo pipefail
          sha="${{ github.sha }}"
          echo "api_image=${API_IMAGE_NAME}:${sha}" >> "$GITHUB_OUTPUT"
          echo "web_image=${WEB_IMAGE_NAME}:${sha}" >> "$GITHUB_OUTPUT"

      - name: Build API image
        run: |
          set -euo pipefail
          docker build \
            --pull \
            -f apps/api/Dockerfile \
            -t "${{ steps.images.outputs.api_image }}" \
            .

      - name: Build web image
        run: |
          set -euo pipefail
          docker build \
            --pull \
            -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_SITE_URL="${PUBLIC_SITE_URL}" \
            --build-arg NEXT_PUBLIC_API_URL="/" \
            --build-arg NEXT_PUBLIC_LEGACY_API_URL="/api" \
            --build-arg API_UPSTREAM_URL="http://api:4000" \
            --build-arg API_PORT="4000" \
            -t "${{ steps.images.outputs.web_image }}" \
            .

      - name: Push API image
        run: |
          set -euo pipefail
          docker push "${{ steps.images.outputs.api_image }}"

      - name: Push web image
        run: |
          set -euo pipefail
          docker push "${{ steps.images.outputs.web_image }}"

  deploy-to-kubernetes:
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Validate deployment settings
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$KUBE_CONFIG_DATA" || { echo "Missing secret: KUBE_CONFIG_DATA"; exit 1; }
          test -n "$JWT_SECRET" || { echo "Missing secret: JWT_SECRET"; exit 1; }
          test -n "$POSTGRES_PASSWORD" || { echo "Missing secret: POSTGRES_PASSWORD"; exit 1; }

      - name: Configure kubeconfig
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 --decode > "$HOME/.kube/config"

      - name: Sync Kubernetes secret
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL: ${{ secrets.GOOGLE_CALLBACK_URL }}
          GIPHY_API_KEY: ${{ secrets.GIPHY_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_REPLY_TO: ${{ secrets.SMTP_REPLY_TO }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          RECAPTCHA_SECRET_KEY: ${{ secrets.RECAPTCHA_SECRET_KEY }}
        run: |
          set -euo pipefail
          kubectl apply -f deploy/k8s/namespace.yaml

          callback_url="${GOOGLE_CALLBACK_URL:-${PUBLIC_SITE_URL%/}/api/auth/google/callback}"
          database_url="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
          secret_manifest="${RUNNER_TEMP}/community-secrets.yaml"

          kubectl -n "${K8S_NAMESPACE}" create secret generic "${K8S_SECRET_NAME}" \
            --from-literal=DATABASE_URL="$database_url" \
            --from-literal=JWT_SECRET="$JWT_SECRET" \
            --from-literal=POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
            --from-literal=GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID" \
            --from-literal=GOOGLE_CLIENT_SECRET="$GOOGLE_CLIENT_SECRET" \
            --from-literal=GOOGLE_CALLBACK_URL="$callback_url" \
            --from-literal=GIPHY_API_KEY="$GIPHY_API_KEY" \
            --from-literal=RESEND_API_KEY="$RESEND_API_KEY" \
            --from-literal=RESEND_FROM="$RESEND_FROM" \
            --from-literal=SMTP_HOST="$SMTP_HOST" \
            --from-literal=SMTP_PORT="$SMTP_PORT" \
            --from-literal=SMTP_SECURE="$SMTP_SECURE" \
            --from-literal=SMTP_USER="$SMTP_USER" \
            --from-literal=SMTP_PASS="$SMTP_PASS" \
            --from-literal=SMTP_FROM="$SMTP_FROM" \
            --from-literal=SMTP_REPLY_TO="$SMTP_REPLY_TO" \
            --from-literal=TURNSTILE_SECRET_KEY="$TURNSTILE_SECRET_KEY" \
            --from-literal=RECAPTCHA_SECRET_KEY="$RECAPTCHA_SECRET_KEY" \
            --dry-run=client -o yaml > "$secret_manifest"

          for required_key in \
            DATABASE_URL \
            JWT_SECRET \
            POSTGRES_PASSWORD \
            GOOGLE_CLIENT_ID \
            GOOGLE_CLIENT_SECRET \
            GOOGLE_CALLBACK_URL \
            GIPHY_API_KEY \
            RESEND_API_KEY \
            RESEND_FROM \
            SMTP_HOST \
            SMTP_PORT \
            SMTP_SECURE \
            SMTP_USER \
            SMTP_PASS \
            SMTP_FROM \
            SMTP_REPLY_TO \
            TURNSTILE_SECRET_KEY \
            RECAPTCHA_SECRET_KEY
          do
            grep -q "^  ${required_key}:" "$secret_manifest" || { echo "Missing secret key in manifest: ${required_key}"; exit 1; }
          done

          kubectl -n "${K8S_NAMESPACE}" delete secret "${K8S_SECRET_NAME}" --ignore-not-found --wait=true
          kubectl create -f "$secret_manifest"

      - name: Render Kubernetes manifests
        id: render
        run: |
          set -euo pipefail
          render_dir="$(mktemp -d)"
          cp -R deploy/k8s/. "$render_dir"/
          escape_sed() {
            printf '%s' "$1" | sed 's/[&|]/\\&/g'
          }
          public_site_url="$(escape_sed "${PUBLIC_SITE_URL%/}")"
          ingress_host="$(escape_sed "${INGRESS_HOST}")"
          tls_secret_name="$(escape_sed "${TLS_SECRET_NAME}")"
          postgres_db="$(escape_sed "${POSTGRES_DB}")"
          postgres_user="$(escape_sed "${POSTGRES_USER}")"

          sed -i "s|edmond25/devopshub-api:latest|${{ needs.build-and-push.outputs.api_image }}|g" "$render_dir/api-deployment.yaml"
          sed -i "s|edmond25/devopshub-web:latest|${{ needs.build-and-push.outputs.web_image }}|g" "$render_dir/web-deployment.yaml"
          sed -i "s|https://devopshub.one|${public_site_url}|g" "$render_dir/configmap.yaml"
          sed -i "s|POSTGRES_DB: \"devopshub\"|POSTGRES_DB: \"${postgres_db}\"|g" "$render_dir/configmap.yaml"
          sed -i "s|POSTGRES_USER: \"devops\"|POSTGRES_USER: \"${postgres_user}\"|g" "$render_dir/configmap.yaml"
          sed -i "s|devopshub.one|${ingress_host}|g" "$render_dir/ingress.yaml"
          sed -i "s|devopshub-one-tls|${tls_secret_name}|g" "$render_dir/ingress.yaml"

          echo "render_dir=${render_dir}" >> "$GITHUB_OUTPUT"

      - name: Validate rendered manifests
        run: |
          set -euo pipefail
          render_dir="${{ steps.render.outputs.render_dir }}"
          rendered_manifest="${RUNNER_TEMP}/devopshub-rendered.yaml"

          kubectl kustomize "$render_dir" > "$rendered_manifest"

          if grep -nE "localhost|127\\.0\\.0\\.1" "$rendered_manifest"; then
            echo "Rendered manifests still contain local-only addresses."
            exit 1
          fi

          if grep -nE "image: .*:latest$" "$rendered_manifest"; then
            echo "Rendered manifests still contain mutable latest image references."
            exit 1
          fi

          for required_key in \
            NODE_ENV \
            API_PORT \
            WEB_PORT \
            POSTGRES_DB \
            POSTGRES_USER \
            NEXT_PUBLIC_API_URL \
            NEXT_PUBLIC_LEGACY_API_URL \
            API_UPSTREAM_URL \
            SITE_URL \
            NEXT_PUBLIC_SITE_URL \
            RESET_PASSWORD_BASE_URL \
            EMAIL_VERIFICATION_BASE_URL \
            CORS_ORIGIN \
            UPLOAD_ROOT
          do
            grep -q "^  ${required_key}:" "$render_dir/configmap.yaml" || { echo "Missing config key in ConfigMap: ${required_key}"; exit 1; }
          done

          kubectl apply --dry-run=client -k "$render_dir"
          kubectl apply --dry-run=server -k "$render_dir"

      - name: Migrate legacy PostgreSQL deployment controller
        run: |
          set -euo pipefail
          if kubectl -n "${K8S_NAMESPACE}" get deployment postgres >/dev/null 2>&1; then
            echo "Removing legacy deployment/postgres before applying StatefulSet."
            kubectl -n "${K8S_NAMESPACE}" delete deployment postgres --wait=true
            kubectl -n "${K8S_NAMESPACE}" wait --for=delete pod -l app=postgres --timeout=300s || true
          fi

      - name: Apply manifests
        run: |
          set -euo pipefail
          kubectl apply -k "${{ steps.render.outputs.render_dir }}"

      - name: Show deployed resources
        run: |
          set -euo pipefail
          kubectl -n "${K8S_NAMESPACE}" get statefulset,deploy,svc,ingress,pvc,endpoints,pods

      - name: Wait for rollouts
        id: rollout
        continue-on-error: true
        run: |
          set -euo pipefail
          kubectl -n "${K8S_NAMESPACE}" rollout status statefulset/postgres --timeout=300s
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/api --timeout=300s
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/web --timeout=300s

      - name: Roll back stateless workloads on failed rollout
        if: ${{ steps.rollout.outcome == 'failure' }}
        run: |
          set -euo pipefail
          kubectl -n "${K8S_NAMESPACE}" rollout undo deployment/api || true
          kubectl -n "${K8S_NAMESPACE}" rollout undo deployment/web || true
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/api --timeout=300s || true
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/web --timeout=300s || true

      - name: Deployment diagnostics
        if: ${{ steps.rollout.outcome == 'failure' }}
        run: |
          set -euo pipefail
          kubectl -n "${K8S_NAMESPACE}" get statefulset,deploy,svc,ingress,pvc,endpoints,pods
          kubectl -n "${K8S_NAMESPACE}" describe statefulset postgres
          kubectl -n "${K8S_NAMESPACE}" describe deployment api
          kubectl -n "${K8S_NAMESPACE}" describe deployment web
          kubectl -n "${K8S_NAMESPACE}" logs pod/postgres-0 --tail=100 || true
          kubectl -n "${K8S_NAMESPACE}" logs deployment/api --tail=200 || true
          kubectl -n "${K8S_NAMESPACE}" logs deployment/web --tail=200 || true

      - name: Fail deployment if rollout was unsuccessful
        if: ${{ steps.rollout.outcome == 'failure' }}
        run: |
          echo "Deployment failed. Web and API were rolled back to the previous ReplicaSet. PostgreSQL was left unchanged for data safety."
          exit 1
