name: DevOpsHub CI

on:
  push:
    branches:
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t devopshub-backend .

      - name: Tag image
        run: docker tag devopshub-backend ${{ secrets.DOCKER_USERNAME }}/devopshub-backend:latest

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/devopshub-backend:latest
