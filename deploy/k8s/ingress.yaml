apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-community
  namespace: devops-community
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  tls:
    - hosts:
        - __INGRESS_HOST__
      secretName: devops-community-tls
  rules:
    - host: __INGRESS_HOST__
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: devops-community-api
                port:
                  number: 4000
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: devops-community-api
                port:
                  number: 4000
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: devops-community-api
                port:
                  number: 4000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devops-community-web
                port:
                  number: 3000
