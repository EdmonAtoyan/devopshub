apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: community
  namespace: devopshub
  labels:
    app.kubernetes.io/name: ingress
    app.kubernetes.io/part-of: devopshub
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - devopshub.one
      secretName: devopshub-one-tls
  rules:
    - host: devopshub.one
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 4000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 4000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
