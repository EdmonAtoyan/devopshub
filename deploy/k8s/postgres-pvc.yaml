apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: devops-community
  labels:
    app: postgres
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: devops-community
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
