apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: devopshub
  labels:
    app: api
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: devopshub
spec:
  replicas: 1
  revisionHistoryLimit: 3
  minReadySeconds: 5
  selector:
    matchLabels:
      app: api
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: api
        app.kubernetes.io/name: api
        app.kubernetes.io/part-of: devopshub
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: migrate
          image: edmond25/devopshub-api:latest
          imagePullPolicy: Always
          command:
            - node
            - scripts/prepare-startup.js
          envFrom:
            - configMapRef:
                name: community-config
            - secretRef:
                name: community-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      containers:
        - name: api
          image: edmond25/devopshub-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
              name: http
          envFrom:
            - configMapRef:
                name: community-config
            - secretRef:
                name: community-secrets
          env:
            - name: SKIP_DB_PREPARE
              value: "true"
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads-data
