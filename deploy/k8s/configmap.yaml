apiVersion: v1
kind: ConfigMap
metadata:
  name: devops-community-config
  namespace: devops-community
data:
  NODE_ENV: production
  PORT: "3000"
  API_PORT: "4000"
  NEXT_PUBLIC_API_URL: /api
  API_UPSTREAM_URL: http://devops-community-api:4000
  NEXT_PUBLIC_SITE_URL: __PUBLIC_SITE_URL__
  RESET_PASSWORD_BASE_URL: __PUBLIC_SITE_URL__
  EMAIL_VERIFICATION_BASE_URL: __PUBLIC_SITE_URL__
  CORS_ORIGIN: __PUBLIC_SITE_URL__
  ALLOW_NGROK_ORIGINS: "false"
