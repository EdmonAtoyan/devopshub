apiVersion: v1
kind: Secret
metadata:
  name: community-secrets
  namespace: devops-community
  labels:
    app.kubernetes.io/name: devops-community
    app.kubernetes.io/part-of: devops-community
type: Opaque
stringData:
  DATABASE_URL: postgresql://devopscommunity:change-me-postgres-password@postgres:5432/devopscommunity?schema=public
  JWT_SECRET: change-me-to-a-long-random-secret
  POSTGRES_PASSWORD: change-me-postgres-password
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  RESEND_API_KEY: ""
  RESEND_FROM: "DevOps Hub <no-reply@example.com>"
  SMTP_HOST: "smtp.sendgrid.net"
  SMTP_PORT: "587"
  SMTP_SECURE: "false"
  SMTP_USER: ""
  SMTP_PASS: ""
  SMTP_FROM: "DevOps Hub <no-reply@example.com>"
  SMTP_REPLY_TO: ""
  TURNSTILE_SECRET_KEY: ""
  RECAPTCHA_SECRET_KEY: ""
