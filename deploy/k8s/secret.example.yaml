apiVersion: v1
kind: Secret
metadata:
  name: devops-community-secrets
  namespace: devops-community
type: Opaque
stringData:
  DATABASE_URL: postgresql://USERNAME:PASSWORD@postgres.example.internal:5432/devopshub?schema=public
  JWT_SECRET: replace-with-a-long-random-secret
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  GIPHY_API_KEY: ""
  RESEND_API_KEY: ""
  RESEND_FROM: "DevOps Hub <no-reply@example.com>"
  SMTP_HOST: "smtp.sendgrid.net"
  SMTP_PORT: "587"
  SMTP_SECURE: "false"
  SMTP_USER: ""
  SMTP_PASS: ""
  SMTP_FROM: "DevOps Hub <no-reply@example.com>"
  SMTP_REPLY_TO: ""
  TURNSTILE_SECRET_KEY: ""
  RECAPTCHA_SECRET_KEY: ""
