apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: devopshub
  labels:
    app: web
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: devopshub
spec:
  type: ClusterIP
  selector:
    app: web
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
