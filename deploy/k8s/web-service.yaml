apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: devops-community
  labels:
    app: web
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: devops-community
spec:
  type: ClusterIP
  selector:
    app: web
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
