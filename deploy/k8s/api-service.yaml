apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: devopshub
  labels:
    app: api
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: devopshub
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - name: http
      port: 4000
      targetPort: http
      protocol: TCP
