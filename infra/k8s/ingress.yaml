apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-community
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "4m"
spec:
  ingressClassName: nginx
  rules:
    - host: devops.community.example
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: devops-api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devops-web
                port:
                  number: 80
