apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: devops-web
  template:
    metadata:
      labels:
        app: devops-web
    spec:
      containers:
        - name: web
          image: ghcr.io/example/devops-web:latest
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: devops-web
spec:
  selector:
    app: devops-web
  ports:
    - port: 80
      targetPort: 3000
