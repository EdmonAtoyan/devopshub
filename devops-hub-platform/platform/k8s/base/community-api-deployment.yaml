apiVersion: apps/v1
kind: Deployment
metadata:
  name: community-api
  namespace: devops-hub
  labels:
    app: community-api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: community-api
  template:
    metadata:
      labels:
        app: community-api
    spec:
      containers:
        - name: community-api
          image: community-api:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              set -e
              npm --workspace @devops-community/api exec -- prisma migrate deploy --schema prisma/schema.prisma
              npm --workspace @devops-community/api run start
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: platform-config
            - secretRef:
                name: platform-secrets
          env:
            - name: PORT
              value: "3001"
            - name: API_PORT
              value: "3001"
          volumeMounts:
            - name: uploads
              mountPath: /uploads
          resources:
            requests:
              cpu: "100m"
              memory: "384Mi"
            limits:
              cpu: "750m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: uploads
          emptyDir: {}
