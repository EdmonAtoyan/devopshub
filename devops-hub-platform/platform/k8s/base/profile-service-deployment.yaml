apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile-service
  namespace: devops-hub
  labels:
    app: profile-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: profile-service
  template:
    metadata:
      labels:
        app: profile-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/profiles/metrics"
        prometheus.io/port: "3000"
    spec:
      serviceAccountName: profile-service-sa
      containers:
        - name: profile-service
          image: profile-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: platform-config
            - secretRef:
                name: platform-secrets
          env:
            - name: SERVICE_NAME
              value: "profile-service"
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "750m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /profiles/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /profiles/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
