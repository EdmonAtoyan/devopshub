apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway-sa
  namespace: devops-hub
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-service-sa
  namespace: devops-hub
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: profile-service-sa
  namespace: devops-hub
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: media-service-sa
  namespace: devops-hub
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: notification-service-sa
  namespace: devops-hub
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-read-config
  namespace: devops-hub
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-read-config-binding
  namespace: devops-hub
subjects:
  - kind: ServiceAccount
    name: api-gateway-sa
  - kind: ServiceAccount
    name: auth-service-sa
  - kind: ServiceAccount
    name: profile-service-sa
  - kind: ServiceAccount
    name: media-service-sa
  - kind: ServiceAccount
    name: notification-service-sa
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: app-read-config
